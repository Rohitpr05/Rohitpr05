<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 419" width="420" height="419">
<style>
    .ascii-line {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 7px;
      white-space: pre;
      fill: #c9d1d9;
    }
    
    .ascii-line {
      opacity: 0;
      animation: reveal 0.35s ease-out forwards;
    }
    @keyframes reveal {
      to { opacity: 1; }
    }
    .cursor {
      fill: #c9d1d9;
      animation: blink 0.9s steps(1) infinite;
      animation-delay: 1.60s;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    </style>
