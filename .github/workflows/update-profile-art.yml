name: Update profile art

on:
  schedule:
    # Runs once a day. GitHub's contribution data is public, so this needs
    # zero secrets/auth -- just the built-in GITHUB_TOKEN for the commit-back.
    - cron: "17 3 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: ${{ github.repository_owner }}
        run: python scripts/fetch_contributions.py

      - name: Render heatmap SVG
        run: python scripts/render_heatmap_svg.py contributions.json contrib-heatmap.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contrib-heatmap.svg contributions.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: refresh contribution heatmap [automated]"
          git push
